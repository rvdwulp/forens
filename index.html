<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P+R Rotterdam — actuele bezetting</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --page: #f9f9f7;
      --surface: #fcfcfb;
      --ink: #0b0b0b;
      --ink-2: #52514e;
      --ink-muted: #898781;
      --border: rgba(11,11,11,0.10);
      --track-neutral: #e1e0d9;

      --status-good: #0ca30c;      --track-good: #d7efd7;
      --status-warning: #fab219;   --track-warning: #fdeecb;
      --status-serious: #ec835a;   --track-serious: #fbe2d7;
      --status-critical: #d03b3b;  --track-critical: #f5d7d7;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --page: #0d0d0d;
        --surface: #1a1a19;
        --ink: #ffffff;
        --ink-2: #c3c2b7;
        --ink-muted: #898781;
        --border: rgba(255,255,255,0.10);
        --track-neutral: #2c2c2a;
        --track-good: #10360f;
        --track-warning: #3d2f08;
        --track-serious: #3f2114;
        --track-critical: #3b1414;
      }
    }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--page);
      color: var(--ink);
      min-height: 100vh;
      font-size: 14px;
      padding: 24px 16px;
    }

    .container { max-width: 960px; margin: 0 auto; }

    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    h1 { font-size: 20px; font-weight: 650; }
    .sub { color: var(--ink-2); font-size: 13px; margin-top: 4px; }

    .header-acties { display: flex; align-items: center; gap: 10px; }
    #laatste-refresh { color: var(--ink-muted); font-size: 12px; }
    #refresh-btn {
      font: inherit;
      background: var(--surface);
      color: var(--ink);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      cursor: pointer;
    }
    #refresh-btn:hover { border-color: var(--ink-muted); }
    #refresh-btn:disabled { opacity: 0.5; cursor: default; }

    .tegels {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    .tegel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .tegel-label { font-size: 13px; font-weight: 600; color: var(--ink-2); }

    .tegel-waarde { font-size: 40px; font-weight: 600; line-height: 1.1; }
    .tegel-waarde .eenheid { font-size: 15px; font-weight: 500; color: var(--ink-2); margin-left: 6px; }

    .meter {
      height: 10px;
      border-radius: 5px;
      background: var(--track-neutral);
      overflow: hidden;
    }
    .meter-vulling {
      height: 100%;
      width: 0%;
      border-radius: 5px;
      transition: width 0.4s ease;
    }
    .tegel[data-status="good"]     .meter { background: var(--track-good); }
    .tegel[data-status="good"]     .meter-vulling { background: var(--status-good); }
    .tegel[data-status="warning"]  .meter { background: var(--track-warning); }
    .tegel[data-status="warning"]  .meter-vulling { background: var(--status-warning); }
    .tegel[data-status="serious"]  .meter { background: var(--track-serious); }
    .tegel[data-status="serious"]  .meter-vulling { background: var(--status-serious); }
    .tegel[data-status="critical"] .meter { background: var(--track-critical); }
    .tegel[data-status="critical"] .meter-vulling { background: var(--status-critical); }

    .tegel-status { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; }
    .status-icoon { font-size: 12px; line-height: 1; }
    .tegel[data-status="good"]     .status-icoon { color: var(--status-good); }
    .tegel[data-status="warning"]  .status-icoon { color: var(--status-warning); }
    .tegel[data-status="serious"]  .status-icoon { color: var(--status-serious); }
    .tegel[data-status="critical"] .status-icoon { color: var(--status-critical); }
    .tegel[data-status="onbekend"] .status-icoon,
    .tegel[data-status="gesloten"] .status-icoon { color: var(--ink-muted); }

    .tegel-detail { color: var(--ink-2); font-size: 12px; }
    .tegel-tijd { color: var(--ink-muted); font-size: 11px; }

    .fout-balk {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 4px solid var(--status-critical);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 16px;
      color: var(--ink-2);
      font-size: 13px;
    }
    .fout-balk.zichtbaar { display: block; }

    footer { margin-top: 24px; color: var(--ink-muted); font-size: 12px; }
    footer a { color: inherit; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>P+R Rotterdam — actuele bezetting</h1>
        <div class="sub">Slinge · Noorderhelling · Kralingse Zoom</div>
      </div>
      <div class="header-acties">
        <span id="laatste-refresh"></span>
        <button id="refresh-btn">Ververs</button>
      </div>
    </header>

    <div class="fout-balk" id="fout-balk"></div>

    <div class="tegels" id="tegels"></div>

    <footer>
      Bron: <a href="https://npropendata.rdw.nl/parkingdata/v2/" target="_blank" rel="noopener">RDW open parkeerdata (Nationaal Parkeer Register)</a>.
      Een GitHub Action ververst de snapshot elke ~10 minuten; waar mogelijk haalt de pagina daarnaast elke minuut live cijfers op.
    </footer>
  </div>

  <script>
    const NPR_INDEX_URL = 'https://npropendata.rdw.nl/parkingdata/v2/';
    const NPR_DYNAMIC_BASE = 'https://npropendata.rdw.nl/parkingdata/v2/dynamic/';
    const POLL_MS = 60 * 1000;
    const CACHE_KEY = 'prMonitorUrls2';
    const ROUTE_KEY = 'prMonitorRoute';

    const LOCATIES = [
      { key: 'slinge',         label: 'P+R Slinge',         patroon: /slinge/i,           uuid: null },
      { key: 'noorderhelling', label: 'P+R Noorderhelling', patroon: /noorderhelling/i,   uuid: null },
      { key: 'kralingsezoom',  label: 'P+R Kralingse Zoom', patroon: /kralingse\s*zoom/i, uuid: '54c095f4-49fe-4d4d-91a4-0fb32a2106df' },
    ];

    // status → icoon + tekst; kleur draagt de betekenis nooit alleen
    const STATUS_TEKST = {
      good:     { icoon: '●', tekst: 'Voldoende plek' },
      warning:  { icoon: '●', tekst: 'Beperkt plek' },
      serious:  { icoon: '●', tekst: 'Bijna vol' },
      critical: { icoon: '●', tekst: 'Vol' },
      gesloten: { icoon: '○', tekst: 'Gesloten' },
      onbekend: { icoon: '○', tekst: 'Geen data' },
    };

    // Het RDW-endpoint stuurt geen CORS-headers, dus een directe fetch wordt
    // door de browser geblokkeerd. Probeer direct en val terug op publieke
    // CORS-proxies; de eerste route die werkt wordt onthouden.
    const ROUTES = [
      u => u,
      u => 'https://corsproxy.io/?url=' + encodeURIComponent(u),
      u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
      u => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u),
    ];
    let routeIndex = Math.min(parseInt(localStorage.getItem(ROUTE_KEY)) || 0, ROUTES.length - 1);

    async function haalJson(url, timeoutMs) {
      let laatsteFout = null;
      for (let i = 0; i < ROUTES.length; i++) {
        const idx = (routeIndex + i) % ROUTES.length;
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), timeoutMs);
        try {
          const res = await fetch(ROUTES[idx](url), { signal: ctrl.signal });
          if (!res.ok) throw new Error('HTTP ' + res.status);
          const data = await res.json();
          routeIndex = idx;
          localStorage.setItem(ROUTE_KEY, String(idx));
          return data;
        } catch (e) {
          laatsteFout = e;
        } finally {
          clearTimeout(timer);
        }
      }
      throw laatsteFout || new Error('geen route beschikbaar');
    }

    function bepaalStatus(s) {
      if (s.open === false) return 'gesloten';
      const vrij = s.vacantSpaces, cap = s.parkingCapacity;
      if (s.full === true || vrij === 0) return 'critical';
      if (typeof vrij !== 'number') return 'onbekend';
      if (typeof cap !== 'number' || cap <= 0) return 'good';
      const ratio = vrij / cap;
      if (ratio < 0.1) return 'serious';
      if (ratio < 0.25) return 'warning';
      return 'good';
    }

    function maakTegels() {
      document.getElementById('tegels').innerHTML = LOCATIES.map(l => `
        <div class="tegel" id="tegel-${l.key}" data-status="onbekend">
          <div class="tegel-label">${l.label}</div>
          <div class="tegel-waarde" id="waarde-${l.key}">–</div>
          <div class="meter"><div class="meter-vulling" id="meter-${l.key}"></div></div>
          <div class="tegel-status">
            <span class="status-icoon" id="icoon-${l.key}">○</span>
            <span id="statustekst-${l.key}">Laden…</span>
          </div>
          <div class="tegel-detail" id="detail-${l.key}"></div>
          <div class="tegel-tijd" id="tijd-${l.key}"></div>
        </div>`).join('');
    }

    function renderTegel(key, status) {
      const st = bepaalStatus(status);
      const info = STATUS_TEKST[st];
      const tegel = document.getElementById('tegel-' + key);
      tegel.dataset.status = st;

      const vrij = status.vacantSpaces, cap = status.parkingCapacity;
      document.getElementById('waarde-' + key).innerHTML =
        typeof vrij === 'number'
          ? `${vrij}<span class="eenheid">vrij</span>`
          : '–';

      const bezet = (typeof vrij === 'number' && typeof cap === 'number' && cap > 0)
        ? Math.min(100, Math.max(0, Math.round((1 - vrij / cap) * 100)))
        : 0;
      document.getElementById('meter-' + key).style.width = bezet + '%';

      document.getElementById('icoon-' + key).textContent = info.icoon;
      document.getElementById('statustekst-' + key).textContent = info.tekst;
      document.getElementById('detail-' + key).textContent =
        (typeof cap === 'number' && typeof vrij === 'number')
          ? `${cap - vrij} van ${cap} plekken bezet (${bezet}%)`
          : 'Capaciteit onbekend';

      if (status.lastUpdated) {
        const ms = status.lastUpdated > 1e12 ? status.lastUpdated : status.lastUpdated * 1000;
        document.getElementById('tijd-' + key).textContent =
          'Meting van ' + new Date(ms).toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
      } else {
        document.getElementById('tijd-' + key).textContent = '';
      }
    }

    function renderTegelFout(key, melding) {
      const tegel = document.getElementById('tegel-' + key);
      tegel.dataset.status = 'onbekend';
      document.getElementById('waarde-' + key).textContent = '–';
      document.getElementById('meter-' + key).style.width = '0%';
      document.getElementById('icoon-' + key).textContent = '○';
      document.getElementById('statustekst-' + key).textContent = 'Geen data';
      document.getElementById('detail-' + key).textContent = melding;
      document.getElementById('tijd-' + key).textContent = '';
    }

    // Snapshot die de GitHub Actions-workflow elke ~10 minuten naast de site
    // deployt. Zelfde origin, dus geen CORS en altijd snel.
    async function haalSnapshot() {
      try {
        const res = await fetch('data.json?t=' + Date.now(), { cache: 'no-store' });
        if (!res.ok) return null;
        const data = await res.json();
        return Array.isArray(data?.locations) ? data : null;
      } catch { return null; }
    }

    async function haalStatus(url) {
      const data = await haalJson(url, 15000);
      const status = data?.parkingFacilityDynamicInformation?.facilityActualStatus;
      if (!status) throw new Error('Onverwacht antwoord van RDW-API');
      return status;
    }

    // Laatste redmiddel als er geen snapshot en geen bekende UUID is: de
    // (grote) RDW-index doorzoeken. Cache alleen daadwerkelijk gevonden URL's,
    // zodat een mislukt of onbruikbaar antwoord niet blijft plakken.
    async function zoekInIndex() {
      const index = await haalJson(NPR_INDEX_URL, 45000);
      const facilities = index?.ParkingFacilities;
      if (!Array.isArray(facilities) || !facilities.length) throw new Error('onbruikbaar index-antwoord');
      const urls = {};
      for (const loc of LOCATIES) {
        const kandidaten = facilities.filter(f => loc.patroon.test(f.name || ''));
        const fac = kandidaten.find(f => f.dynamicDataUrl) || kandidaten[0];
        if (fac) urls[loc.key] = { url: fac.dynamicDataUrl || null, naam: fac.name };
      }
      if (Object.keys(urls).length) localStorage.setItem(CACHE_KEY, JSON.stringify(urls));
      return urls;
    }

    async function ververs() {
      const btn = document.getElementById('refresh-btn');
      const foutBalk = document.getElementById('fout-balk');
      btn.disabled = true;
      foutBalk.classList.remove('zichtbaar');

      // 1. Snapshot tonen: betrouwbaar, hooguit ~10 minuten oud
      const snapshot = await haalSnapshot();
      const snapPer = {};
      if (snapshot) {
        for (const e of snapshot.locations) snapPer[e.key] = e;
        for (const loc of LOCATIES) {
          const e = snapPer[loc.key];
          if (e?.status) renderTegel(loc.key, e.status);
          else renderTegelFout(loc.key, e?.note || 'Geen data in snapshot');
        }
      }

      // 2. Live verversen via de kleine dynamische endpoints
      let cache = {};
      try { cache = JSON.parse(localStorage.getItem(CACHE_KEY)) || {}; } catch {}

      const liveUrl = loc => snapPer[loc.key]?.dynamicDataUrl || cache[loc.key]?.url ||
        (loc.uuid ? NPR_DYNAMIC_BASE + loc.uuid : null);

      let indexUrls = {};
      if (!snapshot && LOCATIES.some(l => !liveUrl(l))) {
        try { indexUrls = await zoekInIndex(); } catch (e) { console.error('RDW-index', e); }
      }

      let liveGelukt = 0;
      await Promise.all(LOCATIES.map(async loc => {
        const snap = snapPer[loc.key];
        const entry = indexUrls[loc.key];
        const url = liveUrl(loc) || entry?.url || null;

        if (!url) {
          if (!snap) {
            renderTegelFout(loc.key, entry && !entry.url
              ? `"${entry.naam}" levert geen realtime data`
              : 'Geen realtime-bron gevonden');
          }
          return;
        }

        try {
          renderTegel(loc.key, await haalStatus(url));
          liveGelukt++;
          cache[loc.key] = { url, naam: snap?.name || entry?.naam || loc.label };
        } catch (e) {
          console.error(loc.label, e);
          if (String(e.message).includes('404')) delete cache[loc.key];
          // Met een snapshot in beeld laten we die gewoon staan
          if (!snap?.status) {
            renderTegelFout(loc.key, snap?.note || 'Ophalen mislukt: ' + e.message);
          }
        }
      }));
      localStorage.setItem(CACHE_KEY, JSON.stringify(cache));

      // 3. Statusregel in de header
      const refreshEl = document.getElementById('laatste-refresh');
      const nu = new Date().toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      if (liveGelukt > 0) {
        refreshEl.textContent = 'Live bijgewerkt ' + nu;
      } else if (snapshot) {
        const ms = snapshot.generatedAt > 1e12 ? snapshot.generatedAt : snapshot.generatedAt * 1000;
        refreshEl.textContent = 'Snapshot van ' +
          new Date(ms).toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
      } else {
        refreshEl.textContent = '';
        foutBalk.textContent = 'Geen data beschikbaar: de RDW-bron is vanuit de browser niet bereikbaar en er is ' +
          'nog geen snapshot. Controleer of de GitHub Actions-workflow draait en Pages op "GitHub Actions" staat.';
        foutBalk.classList.add('zichtbaar');
      }
      btn.disabled = false;
    }

    maakTegels();
    ververs();
    setInterval(() => { if (!document.hidden) ververs(); }, POLL_MS);
    document.getElementById('refresh-btn').addEventListener('click', ververs);
  </script>
</body>
</html>
